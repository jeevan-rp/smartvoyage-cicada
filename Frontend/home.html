<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartVoyage - Eco-Tech Navigation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-fixed-dim": "#4ae183",
                    "surface-container-low": "#f0f4f8",
                    "surface-variant": "#dfe3e7",
                    "on-tertiary-fixed": "#380c00",
                    "secondary": "#4b5a9e",
                    "surface-container-highest": "#dfe3e7",
                    "primary": "#006d37",
                    "tertiary-fixed-dim": "#ffb59c",
                    "outline-variant": "#bbcbbb",
                    "on-primary-container": "#005027",
                    "secondary-container": "#a6b5ff",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#334284",
                    "on-primary-fixed": "#00210c",
                    "on-secondary-container": "#354487",
                    "on-tertiary-container": "#7f2700",
                    "surface-container": "#eaeef2",
                    "inverse-surface": "#2c3134",
                    "on-primary-fixed-variant": "#005228",
                    "on-background": "#171c1f",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#dde1ff",
                    "surface-container-high": "#e4e9ed",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#3d4a3e",
                    "primary-container": "#2ecc71",
                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#001356",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#ff9873",
                    "on-tertiary-fixed-variant": "#822800",
                    "surface-tint": "#006d37",
                    "background": "#f6fafe",
                    "surface-dim": "#d6dade",
                    "surface-bright": "#f6fafe",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "inverse-on-surface": "#edf1f5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "12px",
                    "xl": "32px",
                    "lg": "24px",
                    "gutter": "24px",
                    "xs": "4px",
                    "md": "16px",
                    "base": "8px",
                    "margin": "24px"
            },
            "fontFamily": {
                    "headline-lg": ["Space Grotesk"],
                    "body-lg": ["Manrope"],
                    "body-md": ["Manrope"],
                    "title-lg": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "label-lg": ["Manrope"],
                    "headline-md": ["Space Grotesk"],
                    "display-lg": ["Space Grotesk"]
            },
            "fontSize": {
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "letterSpacing": "0.5px", "fontWeight": "400"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "title-lg": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-sm": ["11px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "500"}],
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "display-lg": ["57px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background overflow-hidden h-screen w-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 py-3 bg-white/40 dark:bg-slate-900/40 backdrop-blur-xl rounded-b-xl border-b border-white/20 shadow-sm">
<div class="flex items-center gap-4">
<span class="text-2xl font-bold tracking-tighter text-emerald-600 dark:text-emerald-400 font-['Space_Grotesk']">SmartVoyage</span>
</div>
<!-- Search Bar Overlaid Layout -->
<div class="flex-1 max-w-md mx-6">
<div class="glass-panel flex items-center px-4 py-2 rounded-full shadow-sm hover:bg-emerald-50/50 transition-colors">
<span class="material-symbols-outlined text-slate-500 mr-2" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface-variant placeholder:text-slate-400" placeholder="Where to?" type="text"/>
<span class="material-symbols-outlined text-emerald-600 ml-2" data-icon="mic">mic</span>
</div>
</div>
<div class="flex items-center gap-3">
<button class="p-2 rounded-full hover:bg-emerald-50/50 transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-slate-500" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Main Content: Map Visual -->
<main class="relative h-screen w-screen pt-16 pb-24">
<!-- Mocked Map Container -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="Highly detailed minimalist topographic map of a modern city with soft green park areas, thin grey transit lines, and subtle blue water features" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-rtdgN2wV9mnWU-4uZXLJH5jCo2ENkc6ZHK6gRAS1IjFWh4Uej8Cl1DZ0P1v94U_wbQxnE0ipQKToxyzpRAV-xkhwg3wJCtE6hD461bSrjMB-O0IysP0sm7RdUxQz_mu_8HMUxtvRU9jbVTSYN9iWL2WIRZ-MN-eT6zrT7Qky5_F_Mm8yryYJ-Zb2keGpFxGQZu2CrYUNyU77-uq0a7YJIWCD_xuQJbREgEpcieKzjpopFa1Z-X989RWR5G8g4UAZu1LiY0Q_F_6e"/>
<!-- Map Overlay UI Elements -->
<div class="absolute inset-0 bg-emerald-900/5 pointer-events-none"></div>
<!-- Map Markers -->
<div class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 group">
<div class="bg-primary-container p-3 rounded-full shadow-lg border-2 border-white animate-pulse">
<span class="material-symbols-outlined text-white" data-icon="directions_car" style="font-variation-settings: 'FILL' 1;">directions_car</span>
</div>
</div>
<div class="absolute top-1/2 left-1/3 group">
<div class="glass-panel p-2 rounded-lg shadow-md border border-white/40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-emerald-600" data-icon="eco" style="font-variation-settings: 'FILL' 1;">eco</span>
<span class="font-label-lg text-emerald-900 font-bold">98% Eco-Efficiency</span>
</div>
</div>
</div>
</div>
<!-- Floating Eco-Stats Overlay (Bento Grid Style) -->
<div class="absolute top-20 right-6 z-10 w-64 space-y-4">
<div class="glass-panel p-4 rounded-2xl shadow-sm border border-white/30">
<div class="flex items-center justify-between mb-2">
<span class="font-label-sm text-slate-500 uppercase tracking-wider">Current Air Quality</span>
<span class="text-emerald-500 material-symbols-outlined" data-icon="air">air</span>
</div>
<div class="text-headline-md font-headline-md text-on-surface">32 <span class="text-label-lg font-normal text-slate-500">AQI</span></div>
<div class="h-1.5 w-full bg-slate-200 rounded-full mt-3 overflow-hidden">
<div class="bg-primary-container h-full w-4/5 rounded-full"></div>
</div>
</div>
<div class="glass-panel p-4 rounded-2xl shadow-sm border border-white/30">
<div class="flex items-center justify-between mb-2">
<span class="font-label-sm text-slate-500 uppercase tracking-wider">Carbon Savings</span>
<span class="text-emerald-500 material-symbols-outlined" data-icon="cloud_done">cloud_done</span>
</div>
<div class="text-headline-md font-headline-md text-on-surface">12.4 <span class="text-label-lg font-normal text-slate-500">kg</span></div>
</div>
</div>
<!-- Floating Action Button (FAB) -->
<button class="fixed bottom-32 right-6 z-50 bg-primary-container text-white p-4 rounded-2xl shadow-[0_8px_30px_rgb(46,204,113,0.3)] active:scale-95 transition-all duration-150 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl" data-icon="routing" style="font-variation-settings: 'FILL' 1;">route</span>
</button>
<!-- Recenter Button -->
<button class="fixed bottom-52 right-6 z-50 glass-panel p-3 rounded-full shadow-sm active:scale-95 transition-all duration-150 flex items-center justify-center">
<span class="material-symbols-outlined text-slate-600" data-icon="my_location">my_location</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/30 dark:bg-slate-900/30 backdrop-blur-2xl rounded-t-2xl border-t border-white/20 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
<!-- Active Tab: Route (Map) -->
<a class="flex flex-col items-center justify-center bg-emerald-500/20 dark:bg-emerald-400/10 text-emerald-700 dark:text-emerald-300 rounded-xl px-4 py-1 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Space_Grotesk'] text-[11px] font-semibold">Route</span>
</a>
<!-- Inactive Tab: Eco-Stats -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1 hover:text-emerald-600 dark:hover:text-emerald-300 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined" data-icon="eco">eco</span>
<span class="font-['Space_Grotesk'] text-[11px] font-semibold">Eco-Stats</span>
</a>
<!-- Inactive Tab: Saved -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1 hover:text-emerald-600 dark:hover:text-emerald-300 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined" data-icon="bookmark">bookmark</span>
<span class="font-['Space_Grotesk'] text-[11px] font-semibold">Saved</span>
</a>
<!-- Inactive Tab: Profile -->
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-4 py-1 hover:text-emerald-600 dark:hover:text-emerald-300 transition-all cubic-bezier(0.4,0,0.2,1)" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Space_Grotesk'] text-[11px] font-semibold">Profile</span>
</a>
</nav>
</body></html>
